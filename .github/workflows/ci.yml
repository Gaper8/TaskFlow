name: TaskFlow

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    strategy:
      matrix:
        node-version: [18, 20]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Installer les dépendances
        run: cd backend && npm ci

      - name: Lancer les tests
        run: cd backend && npm test
    
  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Installer Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Installer les dépendances
        run: cd backend && npm ci

      - name: Vérifier le style du code
        run: cd backend && npm run lint

  audit:
    name: Audit
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
            node-version: 18

      - name: Installer les dépendances
        run: cd backend && npm ci

      - name: Lancer audit et générer rapport
        run: cd backend && npm audit --json > audit-report.json
        continue-on-error: true

      - name: Upload rapport audit
        uses: actions/upload-artifact@v4
        with:
            name: audit-report
            path: backend/audit-report.json

      - name: Échouer si vulnérabilités critiques
        run: cd backend && npm audit --audit-level=high

  build:
    name: Build, Scan & Push
    runs-on: ubuntu-latest
    needs: [test, lint]
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Définir le tag image
        id: vars
        run: echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT

      - name: Builder l'image Docker
        run: |
            docker build \
            -f backend/Dockerfile \
            -t ${{ secrets.DOCKER_USERNAME }}/taskflow:${{ steps.vars.outputs.tag }} \
            backend

      - name: Builder l'image Docker frontend
        run: |
            docker build \
            -f frontend/Dockerfile \
            -t ${{ secrets.DOCKER_USERNAME }}/taskflow-frontend:${{ steps.vars.outputs.tag }} \
            frontend

      - name: Scan Trivy (rapport JSON)
        run: |
            docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v $PWD:/workspace \
            aquasec/trivy image \
            --format json \
            --output /workspace/trivy-report.json \
            ${{ secrets.DOCKER_USERNAME }}/taskflow:${{ steps.vars.outputs.tag }}
        continue-on-error: true

      - name: Upload rapport Trivy
        uses: actions/upload-artifact@v4
        with:
            name: trivy-report
            path: trivy-report.json

      - name: Fail si vulnérabilités CRITICAL
        run: |
            docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy image \
            --severity CRITICAL \
            --exit-code 1 \
            ${{ secrets.DOCKER_USERNAME }}/taskflow:${{ steps.vars.outputs.tag }}

      - name: Scan Trivy frontend (rapport JSON)
        run: |
            docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v $PWD:/workspace \
            aquasec/trivy image \
            --format json \
            --output /workspace/trivy-report-frontend.json \
            ${{ secrets.DOCKER_USERNAME }}/taskflow-frontend:${{ steps.vars.outputs.tag }}
        continue-on-error: true

      - name: Upload rapport Trivy frontend
        uses: actions/upload-artifact@v4
        with:
            name: trivy-report-frontend
            path: trivy-report-frontend.json

      - name: Fail si vulnérabilités CRITICAL frontend
        run: |
            docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy image \
            --severity CRITICAL \
            --exit-code 1 \
            ${{ secrets.DOCKER_USERNAME }}/taskflow-frontend:${{ steps.vars.outputs.tag }}

      - name: Login Docker Hub
        run: |
            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login \
            -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Push image
        run: |
            docker push ${{ secrets.DOCKER_USERNAME }}/taskflow:${{ steps.vars.outputs.tag }}

      - name: Push image frontend
        run: |
            docker push ${{ secrets.DOCKER_USERNAME }}/taskflow-frontend:${{ steps.vars.outputs.tag }}

  deploy-staging:
    name: Deploy Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/staging'
    env:
      K8S_NAMESPACE: staging
      K8S_DEPLOYMENT: taskflow
      K8S_CONTAINER: taskflow
      IMAGE_TAG: ${{ github.sha }}

    steps:
      - uses: actions/checkout@v4

      - name: Installer kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: latest

      - name: Configurer kubeconfig (staging)
        shell: bash
        env:
          KUBECONFIG_CONTENT: ${{ secrets.KUBECONFIG_STAGING }}
        run: |
          mkdir -p "$HOME/.kube"
          if echo "$KUBECONFIG_CONTENT" | base64 -d > "$HOME/.kube/config" 2>/dev/null; then
            echo "kubeconfig staging décodé depuis base64"
          else
            printf '%s' "$KUBECONFIG_CONTENT" > "$HOME/.kube/config"
            echo "kubeconfig staging utilisé en brut"
          fi
          chmod 600 "$HOME/.kube/config"

      - name: Mettre à jour le Deployment
        shell: bash
        run: |
          kubectl -n "$K8S_NAMESPACE" set image deployment/"$K8S_DEPLOYMENT" \
            "$K8S_CONTAINER"="${{ secrets.DOCKER_USERNAME }}/taskflow:$IMAGE_TAG"

  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.event_name == 'push' && github.ref == 'refs/heads/staging'
    env:
      K8S_NAMESPACE: staging
      K8S_DEPLOYMENT: taskflow
      K8S_SERVICE: taskflow
      LOCAL_PORT: 18080
      SERVICE_PORT: 80

    steps:
      - uses: actions/checkout@v4

      - name: Installer kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: latest

      - name: Configurer kubeconfig (staging)
        shell: bash
        env:
          KUBECONFIG_CONTENT: ${{ secrets.KUBECONFIG_STAGING }}
        run: |
          mkdir -p "$HOME/.kube"
          if echo "$KUBECONFIG_CONTENT" | base64 -d > "$HOME/.kube/config" 2>/dev/null; then
            echo "kubeconfig staging décodé depuis base64"
          else
            printf '%s' "$KUBECONFIG_CONTENT" > "$HOME/.kube/config"
            echo "kubeconfig staging utilisé en brut"
          fi
          chmod 600 "$HOME/.kube/config"

      - name: Attendre rollout Ready
        shell: bash
        run: |
          kubectl -n "$K8S_NAMESPACE" rollout status deployment/"$K8S_DEPLOYMENT" --timeout=180s

      - name: Vérifier GET /health
        shell: bash
        run: |
          set -euo pipefail
          kubectl -n "$K8S_NAMESPACE" port-forward service/"$K8S_SERVICE" "$LOCAL_PORT":"$SERVICE_PORT" >/tmp/port-forward.log 2>&1 &
          PF_PID=$!
          cleanup() {
            kill "$PF_PID" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          for i in $(seq 1 10); do
            if curl -sS "http://127.0.0.1:$LOCAL_PORT/health" >/tmp/health.json; then
              break
            fi
            sleep 2
          done

          HTTP_CODE=$(curl -sS -o /tmp/health.json -w "%{http_code}" "http://127.0.0.1:$LOCAL_PORT/health")
          if [ "$HTTP_CODE" != "200" ]; then
            echo "Réponse HTTP inattendue: $HTTP_CODE"
            cat /tmp/health.json || true
            exit 1
          fi

          if ! grep -q '"status"[[:space:]]*:[[:space:]]*"ok"' /tmp/health.json; then
            echo "Le payload /health ne contient pas status: ok"
            cat /tmp/health.json || true
            exit 1
          fi

          echo "Smoke test validé: /health = 200 et status ok"

  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    env:
      K8S_NAMESPACE: production
      K8S_DEPLOYMENT: taskflow
      K8S_CONTAINER: taskflow
      IMAGE_TAG: ${{ github.ref_name }}

    steps:
      - uses: actions/checkout@v4

      - name: Installer kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: latest

      - name: Configurer kubeconfig (production)
        shell: bash
        env:
          KUBECONFIG_CONTENT: ${{ secrets.KUBECONFIG_PRODUCTION }}
        run: |
          mkdir -p "$HOME/.kube"
          if echo "$KUBECONFIG_CONTENT" | base64 -d > "$HOME/.kube/config" 2>/dev/null; then
            echo "kubeconfig production décodé depuis base64"
          else
            printf '%s' "$KUBECONFIG_CONTENT" > "$HOME/.kube/config"
            echo "kubeconfig production utilisé en brut"
          fi
          chmod 600 "$HOME/.kube/config"

      - name: Mettre à jour le Deployment
        shell: bash
        run: |
          kubectl -n "$K8S_NAMESPACE" set image deployment/"$K8S_DEPLOYMENT" \
            "$K8S_CONTAINER"="${{ secrets.DOCKER_USERNAME }}/taskflow:$IMAGE_TAG"

      - name: Attendre rollout Ready
        shell: bash
        run: |
          kubectl -n "$K8S_NAMESPACE" rollout status deployment/"$K8S_DEPLOYMENT" --timeout=180s