name: TaskFlow

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18, 20]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Installer les dépendances
        run: cd backend && npm ci

      - name: Lancer les tests
        run: cd backend && npm test
    
  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Installer Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Installer les dépendances
        run: cd backend && npm ci

      - name: Vérifier le style du code
        run: cd backend && npm run lint

  audit:
    name: Audit
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
            node-version: 18

      - name: Installer les dépendances
        run: cd backend && npm ci

      - name: Lancer audit et générer rapport
        run: cd backend && npm audit --json > audit-report.json
        continue-on-error: true

      - name: Upload rapport audit
        uses: actions/upload-artifact@v4
        with:
            name: audit-report
            path: backend/audit-report.json

      - name: Échouer si vulnérabilités critiques
        run: cd backend && npm audit --audit-level=high

  build:
    name: Build
    runs-on: ubuntu-latest

    needs: [test, lint]

    if: startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/staging'
    steps:
      - uses: actions/checkout@v4

      # Définir le tag de l'image :
      # tag v1.0.0 → stockalert:v1.0.0
      # branche staging → stockalert:staging
      - name: Définir le tag image
        id: vars
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "tag=staging" >> $GITHUB_OUTPUT
          fi

      - name: Builder l'image Docker
        run: |
          docker build \
            -t ${{ secrets.DOCKER_USERNAME }}/stockalert:${{ steps.vars.outputs.tag }} .

      - name: Push sur Docker Hub
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login \
            -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
          docker push ${{ secrets.DOCKER_USERNAME }}/stockalert:${{ steps.vars.outputs.tag }}