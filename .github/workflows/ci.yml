name: TaskFlow

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    strategy:
      matrix:
        node-version: [18, 20]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Installer les dépendances
        run: cd backend && npm ci

      - name: Lancer les tests
        run: cd backend && npm test
    
  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Installer Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Installer les dépendances
        run: cd backend && npm ci

      - name: Vérifier le style du code
        run: cd backend && npm run lint

  audit:
    name: Audit
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
            node-version: 18

      - name: Installer les dépendances
        run: cd backend && npm ci

      - name: Lancer audit et générer rapport
        run: cd backend && npm audit --json > audit-report.json
        continue-on-error: true

      - name: Upload rapport audit
        uses: actions/upload-artifact@v4
        with:
            name: audit-report
            path: backend/audit-report.json

      - name: Échouer si vulnérabilités critiques
        run: cd backend && npm audit --audit-level=high

  build:
    name: Build, Scan & Push
    runs-on: ubuntu-latest
    needs: [test, lint]
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Définir le tag image
        id: vars
        run: echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT

      - name: Builder l'image Docker
        run: |
            docker build \
            -t ${{ secrets.DOCKER_USERNAME }}/stockalert:${{ steps.vars.outputs.tag }} .

      - name: Scan Trivy (rapport JSON)
        run: |
            docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v $PWD:/workspace \
            aquasec/trivy image \
            --format json \
            --output /workspace/trivy-report.json \
            ${{ secrets.DOCKER_USERNAME }}/stockalert:${{ steps.vars.outputs.tag }}
        continue-on-error: true

      - name: Upload rapport Trivy
        uses: actions/upload-artifact@v4
        with:
            name: trivy-report
            path: trivy-report.json

      - name: Fail si vulnérabilités CRITICAL
        run: |
            docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy image \
            --severity CRITICAL \
            --exit-code 1 \
            ${{ secrets.DOCKER_USERNAME }}/stockalert:${{ steps.vars.outputs.tag }}

      - name: Login Docker Hub
        run: |
            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login \
            -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Push image
        run: |
            docker push ${{ secrets.DOCKER_USERNAME }}/stockalert:${{ steps.vars.outputs.tag }}